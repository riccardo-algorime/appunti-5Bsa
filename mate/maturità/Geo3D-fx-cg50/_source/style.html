<style>
  html, body { margin: 0; padding: 0; background: white; }
  body {
    width: 384px;
    box-sizing: border-box;
    padding: 8px 9px 10px 9px;
    color: #050505;
    font-family: DejaVu Sans, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.23;
  }
  h1 {
    font-size: 20px;
    line-height: 1.1;
    margin: 0 0 7px 0;
    font-weight: 800;
    border-bottom: 2px solid #111;
    padding-bottom: 4px;
  }
  h2 {
    font-size: 16px;
    line-height: 1.15;
    margin: 10px 0 4px 0;
    font-weight: 800;
    background: #eeeeee;
    padding: 3px 5px;
    border-left: 4px solid #111;
  }
  p { margin: 4px 0; }
  ul, ol { margin: 4px 0 5px 18px; padding: 0; }
  li { margin: 2px 0; }
  code {
    font-family: DejaVu Sans Mono, monospace;
    font-size: 13px;
    background: #f3f3f3;
    padding: 1px 2px;
    border-radius: 2px;
  }
  pre {
    margin: 4px 0 6px 0;
    padding: 5px;
    background: #f3f3f3;
    border: 1px solid #cccccc;
    white-space: pre-wrap;
    font-family: DejaVu Sans Mono, monospace;
    font-size: 13px;
    line-height: 1.16;
  }
  .math.display {
    display: block;
    overflow-wrap: anywhere;
    margin: 5px 0;
    padding: 4px 3px;
    background: #f7f7f7;
    border: 1px solid #d8d8d8;
    font-size: 92%;
  }
  .math.inline { font-size: 96%; }
  mjx-container[jax="CHTML"][display="true"] { margin: 0.15em 0 !important; overflow-x: hidden; }
  mjx-container { max-width: 100%; }
</style>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
  chtml: { scale: 0.90, linebreaks: { automatic: true, width: 'container' } },
  startup: { typeset: true }
};
</script>
